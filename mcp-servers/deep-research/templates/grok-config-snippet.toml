# Portable Grok MCP registration snippet for deep-research
# Place in your project .grok/config.toml or merge into ~/.grok/config.toml
#
# This uses the two-layer timeout model (client + host) proven for 2–20+ minute research jobs.
# See docs/timeout-patterns.md in meta-utilities root for full explanation.

[mcp_servers.deep-research]
# After `uv tool install -e /path/to/meta-utilities/mcp-servers/deep-research` (recommended)
# or while developing locally.
command = "uvx"
args = ["deep-research-mcp"]
# For local development without installing:
# command = "python"
# args = ["/absolute/path/to/meta-utilities/mcp-servers/deep-research/deep-research-mcp.py"]

env = { PERPLEXITY_API_KEY = "${PERPLEXITY_API_KEY}", XAI_API_KEY = "${XAI_API_KEY}" }
enabled = true

startup_timeout_sec = 30
tool_timeout_sec = 300              # 5 min default for other tools on this server
tool_timeouts = { deep_research = 1800 }  # 30 minutes specifically for deep research calls

# Alternative name if you want multiple variants
# [mcp_servers.deep-research-perplexity]
# ... (same structure)
