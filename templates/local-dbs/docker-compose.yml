# Local Weaviate (vector for research-memory / context-forge), Postgres (optional structured), SurrealDB (governed primary for MemoryItem/ScenarioTrace/Attribution/LiveBusinessContext).
# Non-blocking for pure simulation paths. Required (with health surfacing) for memory/context "hit" paths and governed ODRS persistence.
# Two-layer timeouts still apply.

version: "3.8"
services:
  weaviate:
    image: semitechnologies/weaviate:1.24.0
    ports:
      - "8080:8080"
      - "50051:50051"
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: 'true'
      PERSISTENCE_DATA_PATH: '/var/lib/weaviate'
    volumes:
      - weaviate_data:/var/lib/weaviate
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/v1/.well-known/ready"]
      interval: 5s
      timeout: 3s
      retries: 10

  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: meta
      POSTGRES_PASSWORD: meta
      POSTGRES_DB: meta
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meta -d meta"]
      interval: 5s
      timeout: 3s
      retries: 10

  surreal:
    image: surrealdb/surrealdb:v1.5.0
    ports:
      - "8000:8000"
    command: start --user root --pass root --bind 0.0.0.0:8000 file:/data/surreal.db
    volumes:
      - surreal_data:/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8000/health"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  weaviate_data:
  postgres_data:
  surreal_data:
